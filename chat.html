<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Чат</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #0f0f1a;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

/* контейнер */
.app {
  width: 100%;
  max-width: 600px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* верх */
header {
  background: #2d0a4b;
  padding: 16px;
  text-align: center;
  font-size: 18px;
}

/* сообщения */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* сообщение */
.message {
  max-width: 70%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 15px;
  word-wrap: break-word;
}

/* мои */
.mine {
  background: #6a0dad;
  margin-left: auto;
}

/* чужие */
.other {
  background: #333;
  margin-right: auto;
}

/* низ */
footer {
  display: flex;
  padding: 10px;
  gap: 8px;
  background: #0f0f1a;
}

/* инпут */
input {
  flex: 1;
  padding: 14px;
  border-radius: 25px;
  border: none;
  font-size: 16px;
  outline: none;
}

/* кнопка */
button {
  width: 50px;
  border-radius: 50%;
  border: none;
  background: #6a0dad;
  color: white;
  cursor: pointer;
}

/* маленькие телефоны */
@media (max-width: 400px) {
  input {
    padding: 12px;
  }
}

/* большие экраны */
@media (min-width: 900px) {
  .app {
    border-left: 1px solid #222;
    border-right: 1px solid #222;
  }
}
</style>
</head>

<body>

<div class="app">

<header>Анонимный чат</header>

<div id="messages"></div>

<footer>
  <input id="input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
  <button onclick="send()">➤</button>
</footer>

</div>

<script>
const client = supabase.createClient(
  'https://ghcofgqktlzjwahjbnqp.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoY29mZ3FrdGx6andhaGpibnFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDgwNjEsImV4cCI6MjA5MjkyNDA2MX0.w21w23WkSnjQLBbTaHhC-dJbzyEs4Qvywwt3WXtQs28'
);

const sessionId = Date.now().toString();
const messagesDiv = document.getElementById('messages');

function addMessage(msg) {
  const div = document.createElement('div');
  div.classList.add('message');

  if (msg.session_id === sessionId) {
    div.classList.add('mine');
  } else {
    div.classList.add('other');
  }

  div.innerHTML = `
    ${msg.text}
    <div style="font-size:10px;opacity:0.6;">
      ${new Date(msg.created_at).toLocaleTimeString()}
    </div>
  `;

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// загрузка
async function loadMessages() {
  const { data, error } = await client
    .from('messages')
    .select('*')
    .order('created_at');

  if (error) {
    console.error(error);
    return;
  }

  data.forEach(addMessage);
}

// отправка
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';

  const { data, error } = await client
    .from('messages')
    .insert({
      text,
      session_id: sessionId
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    return;
  }

  addMessage(data);
}

// realtime
client
  .channel('chat')
  .on(
    'postgres_changes',
    {
      event: 'INSERT',
      schema: 'public',
      table: 'messages'
    },
    payload => {
      if (payload.new.session_id !== sessionId) {
        addMessage(payload.new);
      }
    }
  )
  .subscribe();

loadMessages();
</script>

</body>
</html>
